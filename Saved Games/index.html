<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Browser</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'system-ui', 'sans-serif'],
          },
          colors: {
            surface: {
              900: '#0f172a',
              800: '#1e293b',
              700: '#334155',
            }
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0f172a;
      font-family: 'DM Sans', system-ui, sans-serif;
    }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .animate-pulse-fast {
      animation: pulse 1.5s ease-in-out infinite;
    }
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // Rating Stars Component
    function RatingStars({ rate, count }) {
      const fullStars = Math.floor(rate);
      const hasHalf = rate % 1 >= 0.5;
      const emptyStars = 5 - fullStars - (hasHalf ? 1 : 0);

      return (
        <div className="flex items-center gap-1">
          <div className="flex">
            {[...Array(fullStars)].map((_, i) => (
              <svg key={`full-${i}`} className="w-4 h-4 text-amber-400 fill-current" viewBox="0 0 20 20">
                <path d="M10 15l-5.878 3.09 1.123-6.545L.489 6.91l6.572-.955L10 0l2.939 5.955 6.572.955-4.756 4.635 1.123 6.545z"/>
              </svg>
            ))}
            {hasHalf && (
              <svg className="w-4 h-4 text-amber-400 fill-current" viewBox="0 0 20 20">
                <defs>
                  <linearGradient id="halfGrad">
                    <stop offset="50%" stopColor="currentColor"/>
                    <stop offset="50%" stopColor="#334155"/>
                  </linearGradient>
                </defs>
                <path fill="url(#halfGrad)" d="M10 15l-5.878 3.09 1.123-6.545L.489 6.91l6.572-.955L10 0l2.939 5.955 6.572.955-4.756 4.635 1.123 6.545z"/>
              </svg>
            )}
            {[...Array(emptyStars)].map((_, i) => (
              <svg key={`empty-${i}`} className="w-4 h-4 text-slate-600 fill-current" viewBox="0 0 20 20">
                <path d="M10 15l-5.878 3.09 1.123-6.545L.489 6.91l6.572-.955L10 0l2.939 5.955 6.572.955-4.756 4.635 1.123 6.545z"/>
              </svg>
            ))}
          </div>
          <span className="text-xs text-slate-400 ml-1">({count || 0})</span>
        </div>
      );
    }

    // Product Card Component
    function ProductCard({ product }) {
      return (
        <div className="group bg-surface-800 rounded-xl overflow-hidden transition-all duration-300 hover:scale-[1.02] hover:shadow-2xl hover:shadow-orange-500/10 border border-slate-700/50 hover:border-slate-600">
          <div className="aspect-square bg-white p-4 flex items-center justify-center overflow-hidden">
            <img
              src={product.thumbnail}
              alt={product.title}
              className="max-h-full max-w-full object-contain group-hover:scale-105 transition-transform duration-300"
              loading="lazy"
            />
          </div>
          <div className="p-4">
            <span className="inline-block px-2 py-1 text-[10px] font-medium bg-slate-700 text-slate-300 rounded-full mb-2 capitalize">
              {product.category}
            </span>
            <h3 className="font-semibold text-slate-50 text-sm leading-tight mb-2 line-clamp-2">
              {product.title}
            </h3>
            <p className="text-xs text-slate-400 line-clamp-2 mb-3 leading-relaxed">
              {product.description}
            </p>
            <div className="flex items-center justify-between">
              <div>
                <span className="text-xl font-bold text-orange-500">
                  ${product.price}
                </span>
                {product.discountPercentage > 0 && (
                  <span className="ml-2 text-xs text-emerald-400 font-medium">
                    -{product.discountPercentage.toFixed(0)}%
                  </span>
                )}
              </div>
              <RatingStars rate={product.rating} />
            </div>
          </div>
        </div>
      );
    }

    // Skeleton Card for Loading State
    function SkeletonCard() {
      return (
        <div className="bg-surface-800 rounded-xl overflow-hidden border border-slate-700/50">
          <div className="aspect-square bg-surface-700 animate-pulse-fast" />
          <div className="p-4 space-y-3">
            <div className="h-4 w-16 bg-surface-700 rounded animate-pulse-fast" />
            <div className="h-4 w-full bg-surface-700 rounded animate-pulse-fast" />
            <div className="h-3 w-3/4 bg-surface-700 rounded animate-pulse-fast" />
            <div className="flex justify-between items-center pt-2">
              <div className="h-6 w-20 bg-surface-700 rounded animate-pulse-fast" />
              <div className="h-4 w-24 bg-surface-700 rounded animate-pulse-fast" />
            </div>
          </div>
        </div>
      );
    }

    // Search Bar Component
    function SearchBar({ value, onChange }) {
      return (
        <div className="relative w-full max-w-md">
          <svg className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          <input
            type="text"
            placeholder="Search products..."
            value={value}
            onChange={(e) => onChange(e.target.value)}
            className="w-full pl-12 pr-4 py-3 bg-surface-800 border border-slate-700 rounded-full text-slate-50 placeholder-slate-400 focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 transition-all"
          />
          {value && (
            <button
              onClick={() => onChange('')}
              className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 transition-colors"
            >
              <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          )}
        </div>
      );
    }

    // Category Filter Tabs
    function CategoryFilter({ categories, selected, onSelect }) {
      return (
        <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
          {categories.map((cat) => (
            <button
              key={cat}
              onClick={() => onSelect(cat)}
              className={`px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-all ${
                selected === cat
                  ? 'bg-orange-500 text-white shadow-lg shadow-orange-500/30'
                  : 'bg-surface-800 text-slate-300 hover:bg-surface-700 border border-slate-700'
              }`}
            >
              {cat === 'all' ? 'All Products' : cat.charAt(0).toUpperCase() + cat.slice(1)}
            </button>
          ))}
        </div>
      );
    }

    // Error State Component
    function ErrorState({ message, onRetry }) {
      return (
        <div className="flex flex-col items-center justify-center py-20 px-4">
          <svg className="w-16 h-16 text-red-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
          </svg>
          <h3 className="text-xl font-semibold text-slate-50 mb-2">Something went wrong</h3>
          <p className="text-slate-400 text-center mb-6 max-w-md">{message}</p>
          <button
            onClick={onRetry}
            className="px-6 py-3 bg-orange-500 hover:bg-orange-600 text-white font-medium rounded-full transition-colors flex items-center gap-2"
          >
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            Try Again
          </button>
        </div>
      );
    }

    // Empty State Component
    function EmptyState({ searchQuery }) {
      return (
        <div className="flex flex-col items-center justify-center py-20 px-4">
          <svg className="w-16 h-16 text-slate-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <h3 className="text-xl font-semibold text-slate-50 mb-2">No products found</h3>
          <p className="text-slate-400 text-center">
            {searchQuery
              ? `No results for "${searchQuery}". Try a different search term.`
              : 'No products available in this category.'}
          </p>
        </div>
      );
    }

    // Header Component
    function Header({ searchQuery, onSearchChange }) {
      return (
        <header className="sticky top-0 z-10 bg-surface-900/80 backdrop-blur-xl border-b border-slate-800">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 py-4">
            <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-gradient-to-br from-orange-500 to-orange-600 rounded-xl flex items-center justify-center shadow-lg shadow-orange-500/30">
                  <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
                  </svg>
                </div>
                <div>
                  <h1 className="text-xl font-bold text-slate-50">Product Browser</h1>
                  <p className="text-xs text-slate-400">DummyJSON API</p>
                </div>
              </div>
              <div className="flex-1 w-full sm:max-w-md sm:ml-auto">
                <SearchBar value={searchQuery} onChange={onSearchChange} />
              </div>
            </div>
          </div>
        </header>
      );
    }

    // Main App Component
    function App() {
      const [products, setProducts] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedCategory, setSelectedCategory] = useState('all');

      const categories = useMemo(() => {
        const cats = ['all', ...new Set(products.map(p => p.category))];
        return cats;
      }, [products]);

      const filteredProducts = useMemo(() => {
        return products.filter(product => {
          const matchesSearch = product.title.toLowerCase().includes(searchQuery.toLowerCase());
          const matchesCategory = selectedCategory === 'all' || product.category === selectedCategory;
          return matchesSearch && matchesCategory;
        });
      }, [products, searchQuery, selectedCategory]);

      const fetchProducts = async () => {
        setLoading(true);
        setError(null);
        try {
          const response = await fetch('https://dummyjson.com/products?limit=30');
          if (!response.ok) throw new Error(`Failed to fetch: ${response.status}`);
          const data = await response.json();
          setProducts(data.products);
        } catch (err) {
          setError(err.message || 'Failed to load products. Please check your connection.');
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        fetchProducts();
      }, []);

      return (
        <div className="min-h-screen bg-surface-900">
          <Header searchQuery={searchQuery} onSearchChange={setSearchQuery} />

          <main className="max-w-7xl mx-auto px-4 sm:px-6 py-6">
            {error ? (
              <ErrorState message={error} onRetry={fetchProducts} />
            ) : (
              <>
                <div className="mb-6">
                  <CategoryFilter
                    categories={categories}
                    selected={selectedCategory}
                    onSelect={setSelectedCategory}
                  />
                </div>

                {loading ? (
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">
                    {[...Array(8)].map((_, i) => (
                      <SkeletonCard key={i} />
                    ))}
                  </div>
                ) : filteredProducts.length === 0 ? (
                  <EmptyState searchQuery={searchQuery} />
                ) : (
                  <>
                    <div className="flex items-center justify-between mb-4">
                      <p className="text-sm text-slate-400">
                        {filteredProducts.length} {filteredProducts.length === 1 ? 'product' : 'products'} found
                      </p>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">
                      {filteredProducts.map(product => (
                        <ProductCard key={product.id} product={product} />
                      ))}
                    </div>
                  </>
                )}
              </>
            )}
          </main>

          <footer className="border-t border-slate-800 py-6 mt-8">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 text-center text-sm text-slate-500">
              <p>Powered by <a href="https://dummyjson.com" target="_blank" rel="noopener noreferrer" className="text-orange-500 hover:text-orange-400 transition-colors">DummyJSON API</a></p>
            </div>
          </footer>
        </div>
      );
    }

    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
